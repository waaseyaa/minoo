name: Deploy Production

# Gated on CI completion. Deploys only fire after the CI workflow reports
# `success` on a push to main. Manual dispatch is still available for
# out-of-band deploys (e.g. infra-only changes) and deliberately skips the
# CI gate — use with care.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production
    # For workflow_run, only proceed if the upstream CI run succeeded.
    # workflow_dispatch events have no workflow_run payload, so this
    # guard lets them through unconditionally.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      # -----------------------------------------------------------------------
      # Checkout
      #
      # For workflow_run events, pin to the exact SHA that passed CI so we
      # don't deploy a newer commit that hasn't been verified yet. The
      # head_sha value is provided by GitHub and is not user-controllable.
      #
      # Both repos are needed side-by-side because composer.json uses path
      # repositories pointing to ../waaseyaa/packages/*.
      # -----------------------------------------------------------------------

      - name: Checkout minoo
        uses: actions/checkout@v6
        with:
          path: minoo
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Checkout waaseyaa framework
        uses: actions/checkout@v6
        with:
          repository: waaseyaa/framework
          ref: main
          path: waaseyaa

      # -----------------------------------------------------------------------
      # PHP setup
      # -----------------------------------------------------------------------

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      # -----------------------------------------------------------------------
      # Install production-only dependencies for the artifact
      #
      # Tests (PHPUnit + Playwright) are run by the CI workflow; deploy trusts
      # that gate and skips redundant work. Only prod dependencies are needed
      # here.
      # -----------------------------------------------------------------------

      - name: Install production Composer dependencies
        working-directory: minoo
        run: |
          composer install \
            --no-dev \
            --no-interaction \
            --optimize-autoloader \
            --prefer-dist

      # -----------------------------------------------------------------------
      # Assemble build artifact
      # (Admin SPA build removed — waaseyaa/packages/admin was extracted from
      # the monorepo. The newsletter admin Vue SPA is pre-built and tracked
      # in public/admin/newsletter. TODO(#726): wire admin-surface if needed.)
      # -----------------------------------------------------------------------

      - name: Assemble build artifact
        run: |
          mkdir -p minoo/.build
          rsync -aL \
            --exclude='.git' \
            --exclude='.build/' \
            --exclude='tests/' \
            --exclude='/docs/' \
            --exclude='mcp/' \
            --exclude='skills/' \
            --exclude='worktrees/' \
            --exclude='*.sqlite' \
            --exclude='.env' \
            --exclude='storage/framework/packages.php' \
            --exclude='phpunit.xml.dist' \
            --exclude='deploy.php' \
            --exclude='ops/' \
            --exclude='tests/screenshots/' \
            --exclude='storage/uploads/' \
            minoo/ minoo/.build/

      # -----------------------------------------------------------------------
      # Deploy via PHP Deployer
      # -----------------------------------------------------------------------

      - name: Install PHP Deployer
        run: composer global require deployer/deployer --no-interaction

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add known host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan minoo.live >> ~/.ssh/known_hosts

      - name: Deploy
        working-directory: minoo
        run: dep deploy production --no-interaction
