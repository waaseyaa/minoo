name: CI

on:
  push:
    branches: [main, release/v1]
  pull_request:
    branches: [main, release/v1]

# Overlay jobs clone waaseyaa/framework to rsync admin-surface/cli into vendor so CI matches
# monorepo main when split packages lag Packagist. Use `main` (not Minoo branch names): the
# framework repo does not mirror Minoo feature branch names. Do not pin PR/topic branches here —
# they are deleted after merge and will break checkout.
env:
  WAASEYAA_FRAMEWORK_REF: main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify deploy rsync rules
        run: ./bin/verify-deploy-rsync

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-publish --no-check-all

      - name: Check PHP syntax
        run: find src -name '*.php' -print0 | xargs -0 -n1 php -l

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout minoo
        uses: actions/checkout@v6
        with:
          path: minoo

      - name: Checkout waaseyaa framework
        uses: actions/checkout@v6
        with:
          repository: waaseyaa/framework
          ref: ${{ env.WAASEYAA_FRAMEWORK_REF }}
          path: waaseyaa
          token: ${{ secrets.WAASEYAA_PAT }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install dependencies
        working-directory: minoo
        run: composer install --no-interaction --prefer-dist

      - name: Overlay waaseyaa admin-surface and cli from sibling checkout
        run: |
          for pkg in admin-surface cli; do
            src="waaseyaa/packages/${pkg}/src"
            dest="minoo/vendor/waaseyaa/${pkg}/src"
            if [ -d "$src" ] && [ -d "$dest" ]; then
              rsync -a "$src/" "$dest/"
            fi
          done

      - name: Run PHPStan
        working-directory: minoo
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout minoo
        uses: actions/checkout@v6
        with:
          path: minoo

      - name: Checkout waaseyaa framework
        uses: actions/checkout@v6
        with:
          repository: waaseyaa/framework
          ref: ${{ env.WAASEYAA_FRAMEWORK_REF }}
          path: waaseyaa
          token: ${{ secrets.WAASEYAA_PAT }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install dependencies
        working-directory: minoo
        run: composer install --no-interaction --prefer-dist

      - name: Overlay waaseyaa admin-surface and cli from sibling checkout
        run: |
          for pkg in admin-surface cli; do
            src="waaseyaa/packages/${pkg}/src"
            dest="minoo/vendor/waaseyaa/${pkg}/src"
            if [ -d "$src" ] && [ -d "$dest" ]; then
              rsync -a "$src/" "$dest/"
            fi
          done

      - name: Run unit tests
        working-directory: minoo
        run: ./vendor/bin/phpunit --testsuite MinooUnit

      - name: Crisis OG assets command (dry-run)
        working-directory: minoo
        env:
          MINOO_CRISIS_OG_AUTO: "1"
        run: php bin/waaseyaa crisis:og-assets --dry-run

      - name: Run integration tests
        working-directory: minoo
        run: ./vendor/bin/phpunit --testsuite MinooIntegration

  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    steps:
      - name: Checkout minoo
        uses: actions/checkout@v6
        with:
          path: minoo

      - name: Checkout waaseyaa framework
        uses: actions/checkout@v6
        with:
          repository: waaseyaa/framework
          ref: ${{ env.WAASEYAA_FRAMEWORK_REF }}
          path: waaseyaa
          token: ${{ secrets.WAASEYAA_PAT }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: minoo/package-lock.json

      - name: Install PHP dependencies
        working-directory: minoo
        run: composer install --no-interaction --prefer-dist

      - name: Overlay waaseyaa admin-surface and cli from sibling checkout
        run: |
          for pkg in admin-surface cli; do
            src="waaseyaa/packages/${pkg}/src"
            dest="minoo/vendor/waaseyaa/${pkg}/src"
            if [ -d "$src" ] && [ -d "$dest" ]; then
              rsync -a "$src/" "$dest/"
            fi
          done

      - name: Install Node dependencies
        working-directory: minoo
        run: npm ci

      - name: Install Playwright browsers
        working-directory: minoo
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: minoo
        env:
          APP_ENV: testing
        run: npx playwright test --ignore-snapshots

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout minoo
        uses: actions/checkout@v6
        with:
          path: minoo

      - name: Checkout waaseyaa framework
        uses: actions/checkout@v6
        with:
          repository: waaseyaa/framework
          ref: ${{ env.WAASEYAA_FRAMEWORK_REF }}
          path: waaseyaa
          token: ${{ secrets.WAASEYAA_PAT }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        working-directory: minoo
        run: composer install --no-interaction --prefer-dist

      - name: Overlay waaseyaa admin-surface and cli from sibling checkout
        run: |
          for pkg in admin-surface cli; do
            src="waaseyaa/packages/${pkg}/src"
            dest="minoo/vendor/waaseyaa/${pkg}/src"
            if [ -d "$src" ] && [ -d "$dest" ]; then
              rsync -a "$src/" "$dest/"
            fi
          done

      - name: Run composer audit
        working-directory: minoo
        run: composer audit --format=plain

      - name: Check for secrets in tracked files
        working-directory: minoo
        run: |
          fail=0
          # Check for common secret patterns in tracked files
          if git grep -lE '(SENDGRID_API_KEY|DB_PASSWORD|APP_SECRET|WAASEYAA_PAT)\s*=' -- ':!.env.example' ':!*.md' ':!*.json' 2>/dev/null; then
            echo "FAIL: Possible secrets found in tracked files"
            fail=1
          fi
          # Check for .env files that shouldn't be committed
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "FAIL: .env file is tracked in git"
            fail=1
          fi
          exit $fail

  commercial-use-check:
    name: Commercial Use Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for commercial/payment code
        run: |
          fail=0
          echo "Scanning src/ and templates/ for commercial code patterns..."
          if grep -rlE '\b(stripe|paywall|subscription_tier|paid_plan|payment_gateway)\b' src/ templates/ 2>/dev/null; then
            echo "FAIL: Commercial/payment code detected in src/ or templates/"
            echo "V1 is non-commercial. CC BY-NC-SA content cannot be behind a paywall."
            fail=1
          fi
          if [ $fail -eq 0 ]; then
            echo "PASS: No commercial code patterns found"
          fi
          exit $fail
