<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a0a0a;
  color: #f0ece6;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 100px;
  position: relative;
}

/* Decorative gradient accent */
body::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, #2a9d8f, #6a9caf, #f4a261, #e63946, #8338ec);
}

/* Subtle decorative circle */
body::after {
  content: '';
  position: absolute;
  right: -60px;
  bottom: -60px;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  border: 1px solid rgba(240, 236, 230, 0.06);
}

.logo {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #2a9d8f;
  margin-bottom: 32px;
}

.title {
  font-size: 56px;
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 24px;
  max-width: 900px;
}

.tagline {
  font-size: 24px;
  color: rgba(240, 236, 230, 0.7);
  line-height: 1.5;
  max-width: 700px;
  margin-bottom: 40px;
}

.url {
  font-size: 20px;
  color: #2a9d8f;
  font-weight: 500;
  letter-spacing: 0.02em;
}

/* Domain color dots */
.dots {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
</style>
</head>
<body>
  <div class="logo">Minoo</div>
  <div class="dots">
    <span class="dot" style="background: #e63946"></span>
    <span class="dot" style="background: #f4a261"></span>
    <span class="dot" style="background: #2a9d8f"></span>
    <span class="dot" style="background: #6a9caf"></span>
    <span class="dot" style="background: #8338ec"></span>
  </div>
  <h1 class="title">Connecting Indigenous Communities</h1>
  <p class="tagline">Events, teachings, Elder support, language, and community. Built by community, for community. No ads, no extraction.</p>
  <span class="url">minoo.live</span>
</body>
</html>
