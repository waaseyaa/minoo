# Occurrence map for migrate-community-marker-to-explicit-tenancy-01KR69KT
#
# Operation: remove. The `HasCommunityInterface` marker is removed from
# 7 entity classes (and their `use` import). A parallel `tenancy:` named
# argument is added to the corresponding `EntityType` constructor calls
# in their owning providers — this is a NEW string at a different
# location, not a 1:1 replacement, so `target.replacement` is omitted.
#
# Schema reference: src/doctrine/schemas/occurrence-map.schema.yaml
# Valid actions:  rename | manual_review | do_not_change | rename_if_user_visible
# Valid operations: rename | remove | deprecate

target:
  term: HasCommunityInterface
  operation: remove

categories:
  code_symbols:         { action: rename }                 # PHP class/interface tokens in src/Entity/ and src/Provider/Entity/
  import_paths:         { action: rename }                 # `use Waaseyaa\Entity\Community\HasCommunityInterface;` lines
  filesystem_paths:     { action: do_not_change }          # No filesystem-literal references to the marker exist
  serialized_keys:      { action: do_not_change }          # Marker is reflected at runtime only; never serialized
  cli_commands:         { action: do_not_change }          # No CLI commands reference the marker
  user_facing_strings:  { action: do_not_change }          # No user-facing copy mentions the marker
  tests_fixtures:       { action: rename }                 # Allow mechanical replacement if a test asserts via instanceof
  logs_telemetry:       { action: do_not_change }          # No telemetry labels reference the marker

exceptions:
  - path: "vendor/**"
    action: do_not_change
    reason: "Framework owns the timeline for deleting its own marker file at vendor/waaseyaa/entity/src/Community/HasCommunityInterface.php; this mission only stops *using* the marker."
  - path: "kitty-specs/**"
    action: manual_review
    reason: "Planning artifacts (spec.md, plan.md, occurrence_map.yaml itself, tasks/*.md) reference the marker name in prose for documentation purposes. They may change during planning/rescope and should be human-reviewed, not auto-renamed."
