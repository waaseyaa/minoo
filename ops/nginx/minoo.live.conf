##
## Nginx virtual host — minoo.live
##
## SSL is managed by Certbot (Let's Encrypt).
## After running certbot --nginx, it will insert ssl_certificate directives
## into the HTTPS server block automatically.
##
## PHP-FPM socket path: match the socket used by other sites on this server.
## Verify with: ls /run/php/
##

server {
    listen 80;
    listen [::]:80;
    server_name minoo.live www.minoo.live;

    # Certbot will redirect to HTTPS automatically; this block satisfies ACME.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://minoo.live$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name minoo.live;

    # -------------------------------------------------------------------------
    # SSL — Certbot fills these in automatically
    # -------------------------------------------------------------------------
    # ssl_certificate     /etc/letsencrypt/live/minoo.live/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/minoo.live/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # -------------------------------------------------------------------------
    # Web root points at current Deployer release
    # -------------------------------------------------------------------------
    root  /home/deployer/minoo/current/public;
    index index.php;

    access_log /var/log/nginx/minoo.live-access.log;
    error_log  /var/log/nginx/minoo.live-error.log;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # -------------------------------------------------------------------------
    # Static assets — serve directly, long cache
    # -------------------------------------------------------------------------
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|ico|jpg|jpeg|png|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # PHP requests via FPM
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Match the socket used by other sites on this server.
        # Adjust the socket path if the server uses php8.3-fpm or a named pool.
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;

        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_param  SERVER_NAME $server_name;
        fastcgi_param  HTTPS       on;

        fastcgi_read_timeout 60;
    }

    # -------------------------------------------------------------------------
    # Deny access to sensitive paths
    # -------------------------------------------------------------------------
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* composer\.(json|lock)$ {
        deny all;
    }

    location ~* \.env {
        deny all;
    }

    # www → non-www redirect (handle after SSL is set up)
    # Uncomment once DNS is configured:
    # if ($host = "www.minoo.live") {
    #     return 301 https://minoo.live$request_uri;
    # }
}
